name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit is pushed to the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, typecheck, format & build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: Format check (Prettier)
        run: npm run format:check

      - name: Build (Next.js)
        run: npm run build
        env:
          # Provide a fake backend URL for build-time so any env validation passes.
          # Real value is injected at deploy time.
          BACKEND_API_URL: http://localhost:8080
          SESSION_SECRET: dummy-build-time-secret-not-used-at-runtime
          NEXT_PUBLIC_APP_URL: http://localhost:3000
